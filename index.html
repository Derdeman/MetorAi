<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous" defer></script>

    <script>
        // VARSAYILAN BAŞLANGIÇ VERİLERİ
        const defaultProducts = [
            { id: '1', name: 'Vakumlu Normal Yufka (6 Yaprak)', desc: '1000 gr taze imalat paket.', icon: 'fa-stroopwafel', inStock: true },
            { id: '2', name: 'Su Böreklik Özel Yufka', desc: '700 gr kalın hamurlu su böreği yufkası.', icon: 'fa-stroopwafel', inStock: true },
            { id: '3', name: 'Bol Malzemeli Ev Mantısı', desc: '500 gr dondurulmuş el mantısı.', icon: 'fa-bowl-rice', inStock: true }
        ];

        const defaultManagers = [
            { user: 'admin', pass: '123', role: 'Süper Yönetici' }
        ];

        const defaultCorporates = [
            { id: 'c1', company: 'Meram Gross Marketleri', name: 'Ahmet Çelik', phone: '0332 444 01 42', user: 'meramgross', pass: '4242' },
            { id: 'c2', company: 'Selçuklu Unlu Mamülleri', name: 'Mehmet Kaya', phone: '0332 123 45 67', user: 'selcuklu', pass: '1234' }
        ];

        const defaultOrders = [
            { id: 'o1', company: 'Meram Gross Marketleri', product: 'Vakumlu Normal Yufka (6 Yaprak)', quantity: '150 Paket', note: 'Sabah erkenden teslim.', status: 'Hazırlanıyor' }
        ];

        // TARAYICI HAFIZASINDAN VERİLERİ YÜKLEME
        let products = JSON.parse(localStorage.getItem('ym_products')) || defaultProducts;
        let managerAccounts = JSON.parse(localStorage.getItem('ym_managers')) || defaultManagers;
        let corporateAccounts = JSON.parse(localStorage.getItem('ym_corporates')) || defaultCorporates;
        let orders = JSON.parse(localStorage.getItem('ym_orders')) || defaultOrders;

        let currentLoggedCorporate = null;

        function saveToLocalStorage() {
            localStorage.setItem('ym_products', JSON.stringify(products));
            localStorage.setItem('ym_managers', JSON.stringify(managerAccounts));
            localStorage.setItem('ym_corporates', JSON.stringify(corporateAccounts));
            localStorage.setItem('ym_orders', JSON.stringify(orders));
        }

        function renderAll() {
            renderClientProducts();
            renderAdminStockTable();
            renderCorporateTable();
            renderOrdersTable();
            renderManagersTable();
        }

        function renderClientProducts() {
            const grid = document.getElementById('client-products-grid');
            if(!grid) return; grid.innerHTML = '';
            products.forEach(p => {
                const col = document.createElement('div'); col.className = 'col-6 col-md-4';
                const badge = p.inStock ? `<span class="badge bg-success small">Stokta Var</span>` : `<span class="badge bg-danger small">Tükendi</span>`;
                col.innerHTML = `<div class="card h-100 product-card shadow-sm border-0"><div class="icon-wrapper"><i class="fa-solid ${p.icon} fa-2x"></i></div><div class="card-body p-2 text-center"><h6>${p.name}</h6><p class="text-muted small">${p.desc}</p>${badge}</div></div>`;
                grid.appendChild(col);
            });
        }

        function renderAdminStockTable() {
            const tbody = document.getElementById('admin-stock-table-body');
            if(!tbody) return; tbody.innerHTML = '';
            products.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><b class="small">${p.name}</b></td><td class="small text-muted">${p.desc}</td><td>${p.inStock?'<span class="badge bg-success">Var</span>':'<span class="badge bg-danger">Yok</span>'}</td><td class="text-end"><button class="btn btn-sm btn-dark p-1 px-2" style="font-size:11px;" onclick="toggleStock('${p.id}')">Durum Değiştir</button></td>`;
                tbody.appendChild(tr);
            });
        }

        function toggleStock(id) {
            const idx = products.findIndex(p => p.id === id);
            if(idx !== -1) { products[idx].inStock = !products[idx].inStock; saveToLocalStorage(); renderAll(); }
        }

        function renderCorporateTable() {
            const tbody = document.getElementById('corporate-table-body');
            if(!tbody) return; tbody.innerHTML = '';
            corporateAccounts.forEach(c => {
                tbody.innerHTML += `<tr>
                    <td class="fw-bold small text-dark">${c.company}</td>
                    <td class="small">${c.name}</td>
                    <td class="small">${c.phone}</td>
                    <td><span class="badge bg-primary">${c.user}</span></td>
                    <td><code class="text-dark">${c.pass}</code></td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-danger p-1 px-2" style="font-size:11px;" onclick="deleteCorporate('${c.id}', '${c.company}')">
                            <i class="fa-solid fa-trash-can"></i> Sil
                        </button>
                    </td>
                </tr>`;
            });
        }

        function deleteCorporate(id, companyName) {
            if(confirm(companyName + ' şirket hesabını kalıcı olarak silmek istediğinize emin misiniz?')) {
                corporateAccounts = corporateAccounts.filter(c => c.id !== id);
                saveToLocalStorage();
                renderAll();
            }
        }

        function renderOrdersTable() {
            const tbody = document.getElementById('orders-table-body');
            if(!tbody) return; tbody.innerHTML = '';
            orders.forEach(o => {
                let badgeColor = o.status === 'Hazır (Teslimata Uygun)' ? 'bg-success' : 'bg-warning text-dark';
                tbody.innerHTML += `<tr>
                    <td class="fw-bold small text-primary">${o.company}</td>
                    <td class="small">${o.product}</td>
                    <td class="small fw-bold">${o.quantity}</td>
                    <td class="small text-muted">${o.note}</td>
                    <td><span class="badge ${badgeColor}">${o.status}</span></td>
                    <td class="text-end">
                        <button class="btn btn-xs btn-warning p-1 text-dark fw-bold mb-1 mb-md-0" style="font-size:10px;" onclick="changeOrderStatus('${o.id}', 'Hazırlanıyor')">Hazırlanıyor</button>
                        <button class="btn btn-xs btn-success p-1 text-white fw-bold" style="font-size:10px;" onclick="changeOrderStatus('${o.id}', 'Hazır (Teslimata Uygun)')">Hazır</button>
                    </td>
                </tr>`;
            });
        }

        function changeOrderStatus(orderId, newStatus) {
            const idx = orders.findIndex(o => o.id === orderId);
            if(idx !== -1) {
                orders[idx].status = newStatus;
                saveToLocalStorage();
                renderAll();
                if(currentLoggedCorporate) { renderCorporateSelfPanel(); }
            }
        }

        function renderManagersTable() {
            const tbody = document.getElementById('managers-table-body');
            if(!tbody) return; tbody.innerHTML = '';
            managerAccounts.forEach(m => {
                tbody.innerHTML += `<tr><td class="fw-bold small">${m.user}</td><td class="small">${m.role}</td><td><code>${m.pass}</code></td></tr>`;
            });
        }

        function renderCorporateSelfPanel() {
            if(!currentLoggedCorporate) return;
            document.getElementById('logged-corp-name').innerText = currentLoggedCorporate.company;
            
            const tbody = document.getElementById('my-orders-table-body');
            tbody.innerHTML = '';
            orders.filter(o => o.company === currentLoggedCorporate.company).forEach(o => {
                let badgeColor = o.status === 'Hazır (Teslimata Uygun)' ? 'bg-success' : 'bg-warning text-dark';
                tbody.innerHTML += `<tr><td class="fw-bold small">${o.product}</td><td class="small fw-bold text-success">${o.quantity}</td><td class="small text-muted">${o.note}</td><td><span class="badge ${badgeColor}">${o.status}</span></td></tr>`;
            });

            const select = document.getElementById('corpSelfProductSelect');
            select.innerHTML = '';
            products.forEach(p => {
                select.innerHTML += `<option value="${p.name}">${p.name}</option>`;
            });
        }

        function unifiedLoginEngine() {
            const type = document.getElementById('loginType').value;
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const rememberBox = document.getElementById('rememberMe').checked;
            const err = document.getElementById('loginError');

            if (type === 'admin') {
                const success = managerAccounts.some(acc => acc.user === u && acc.pass === p);
                if (success) {
                    err.classList.add('d-none');
                    if(rememberBox) {
                        localStorage.setItem('ym_remember_user', u);
                        localStorage.setItem('ym_remember_type', 'admin');
                    } else {
                        localStorage.removeItem('ym_remember_user');
                        localStorage.removeItem('ym_remember_type');
                    }
                    // Modal kapatma işlemini sağlama alalım
                    const modalEl = document.getElementById('loginModal');
                    const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                    modalInstance.hide();
                    
                    document.getElementById('client-interface').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'block';
                    renderAll();
                    window.scrollTo(0, 0);
                } else {
                    err.classList.remove('d-none');
                }
            } else if (type === 'corporate') {
                const matchedCorp = corporateAccounts.find(acc => acc.user === u && acc.pass === p);
                if (matchedCorp) {
                    err.classList.add('d-none');
                    if(rememberBox) {
                        localStorage.setItem('ym_remember_user', u);
                        localStorage.setItem('ym_remember_type', 'corporate');
                    } else {
                        localStorage.removeItem('ym_remember_user');
                        localStorage.removeItem('ym_remember_type');
                    }
                    const modalEl = document.getElementById('loginModal');
                    const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                    modalInstance.hide();

                    currentLoggedCorporate = matchedCorp;
                    document.getElementById('client-interface').style.display = 'none';
                    document.getElementById('corporate-panel').style.display = 'block';
                    renderCorporateSelfPanel();
                    window.scrollTo(0, 0);
                } else {
                    err.classList.remove('d-none');
                }
            }
        }

        document.getElementById('corpSelfOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if(!currentLoggedCorporate) return;

            orders.push({
                id: 'o_' + Date.now(),
                company: currentLoggedCorporate.company,
                product: document.getElementById('corpSelfProductSelect').value,
                quantity: document.getElementById('corpSelfQuantity').value,
                note: document.getElementById('corpSelfNote').value || "-",
                status: 'Hazırlanıyor'
            });

            saveToLocalStorage();
            alert('Siparişiniz fabrikaya iletildi!');
            document.getElementById('corpSelfOrderForm').reset();
            switchCorpTab('tab-corp-orders');
        });

        document.getElementById('addProductForm').addEventListener('submit', function(e) {
            e.preventDefault();
            products.push({ id: 'p_'+Date.now(), name: document.getElementById('newProdName').value, desc: document.getElementById('newProdDesc').value, icon: 'fa-stroopwafel', inStock: true });
            saveToLocalStorage(); renderAll(); document.getElementById('addProductForm').reset();
            closeModal('addProductModal');
        });

        document.getElementById('addCorporateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newCorp = {
                id: 'c_' + Date.now(),
                company: document.getElementById('corpCompany').value,
                name: document.getElementById('corpName').value,
                phone: document.getElementById('corpPhone').value,
                user: document.getElementById('corpUser').value.trim(),
                pass: document.getElementById('corpPass').value.trim()
            };
            corporateAccounts.push(newCorp);
            saveToLocalStorage();
            renderAll(); 
            document.getElementById('addCorporateForm').reset();
            closeModal('addCorporateModal');
            alert('Kurumsal şirket hesabı başarıyla açıldı ve kalıcı olarak kaydedildi!');
        });

        document.getElementById('createOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            orders.push({
                id: 'o_' + Date.now(),
                company: document.getElementById('orderCompanySelect').value,
                product: document.getElementById('orderProductSelect').value,
                quantity: document.getElementById('orderQuantity').value,
                note: document.getElementById('orderNote').value || "-",
                status: 'Hazırlanıyor'
            });
            saveToLocalStorage(); renderAll(); document.getElementById('createOrderForm').reset();
            closeModal('createOrderModal');
        });

        document.getElementById('addManagerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            managerAccounts.push({ user: document.getElementById('mgrUser').value.trim(), pass: document.getElementById('mgrPass').value.trim(), role: document.getElementById('mgrRole').value });
            saveToLocalStorage(); renderAll(); document.getElementById('addManagerForm').reset();
            closeModal('addManagerModal');
        });

        function populateOrderDropdowns() {
            const compSelect = document.getElementById('orderCompanySelect');
            const prodSelect = document.getElementById('orderProductSelect');
            compSelect.innerHTML = ''; prodSelect.innerHTML = '';
            corporateAccounts.forEach(c => { compSelect.innerHTML += `<option value="${c.company}">${c.company}</option>`; });
            products.forEach(p => { prodSelect.innerHTML += `<option value="${p.name}">${p.name}</option>`; });
        }

        function closeModal(id) {
            const modalEl = document.getElementById(id);
            const modalInstance = bootstrap.Modal.getInstance(modalEl);
            if(modalInstance) modalInstance.hide();
        }

        function switchAdminTab(id) {
            document.querySelectorAll('#admin-panel .panel-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('#admin-panel .sidebar .nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('link-' + id.replace('tab-', '')).classList.add('active');
        }

        function switchCorpTab(id) {
            document.querySelectorAll('#corporate-panel .panel-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('#corporate-panel .corp-sidebar .nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('link-' + id.replace('tab-', '')).classList.add('active');
            if(id === 'tab-corp-orders') { renderCorporateSelfPanel(); }
        }

        function logoutSystem() {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('corporate-panel').style.display = 'none';
            document.getElementById('client-interface').style.display = 'block';
            document.getElementById('username').value = ''; document.getElementById('password').value = '';
            currentLoggedCorporate = null;
            window.scrollTo(0, 0);
        }

        window.onload = function() {
            const savedUser = localStorage.getItem('ym_remember_user');
            const savedType = localStorage.getItem('ym_remember_type');
            if(savedUser && savedType) {
                document.getElementById('username').value = savedUser;
                document.getElementById('loginType').value = savedType;
                document.getElementById('rememberMe').checked = true;
            }
            renderAll();
        };
    </script>
